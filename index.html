<style>
:root {
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --bg-surface: #F3F2EE;
  --bg-tag: #EEEDEA;
  --text-1: #1A1A18;
  --text-2: #6B6B66;
  --text-3: #9C9C96;
  --border: #E5E4E0;
  --border-h: #D0CFCB;
  --accent: #1D6B4F;
  --accent-l: #E8F5EE;
  --accent-t: #15503B;
  --blue: #2563EB;
  --blue-l: #EFF6FF;
  --amber: #D97706;
  --amber-l: #FFFBEB;
  --red: #DC2626;
  --red-l: #FEF2F2;
  --purple: #7C3AED;
  --purple-l: #F5F3FF;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  --font-kr: 'Noto Sans KR', sans-serif;
  --font-en: 'Outfit', sans-serif;
  --tr: 0.18s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-kr);background:var(--bg);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.header-inner{max-width:1200px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--font-en);font-weight:700;font-size:19px;color:var(--accent);display:flex;align-items:center;gap:8px;letter-spacing:-0.5px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-3);}
.header-right .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:3px;}
.header-right strong{color:var(--text-1);}

/* HERO */
.hero{max-width:1200px;margin:0 auto;padding:40px 24px 20px;text-align:center;}
.hero h1{font-size:28px;font-weight:700;line-height:1.35;letter-spacing:-0.5px;margin-bottom:8px;}
.hero h1 em{font-style:normal;background:linear-gradient(120deg,var(--accent-l) 0%,var(--accent-l) 100%);background-size:100% 38%;background-repeat:no-repeat;background-position:0 88%;color:var(--accent-t);}
.hero p{font-size:15px;color:var(--text-2);max-width:480px;margin:0 auto;}

/* SEARCH */
.search-section{max-width:1200px;margin:0 auto;padding:0 24px 16px;}
.search-bar{display:flex;align-items:center;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:0 14px;box-shadow:var(--shadow-sm);transition:border-color var(--tr),box-shadow var(--tr);max-width:560px;margin:0 auto;}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,107,79,0.1);}
.search-icon{color:var(--text-3);flex-shrink:0;}
.search-bar input{flex:1;border:none;outline:none;padding:11px 10px;font-size:14px;font-family:var(--font-kr);background:transparent;color:var(--text-1);}
.search-bar input::placeholder{color:var(--text-3);}

/* FILTERS */
.filters-section{max-width:1200px;margin:0 auto;padding:0 24px 16px;}
.filter-group{margin-bottom:8px;display:flex;align-items:flex-start;gap:0;flex-wrap:wrap;}
.filter-label{font-size:11.5px;font-weight:600;color:var(--text-3);min-width:52px;padding:6px 8px 6px 0;text-align:right;flex-shrink:0;letter-spacing:0.3px;}
.filter-pills{display:flex;flex-wrap:wrap;gap:5px;}
.pill{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:var(--bg-card);font-size:12.5px;font-family:var(--font-kr);color:var(--text-2);cursor:pointer;transition:all var(--tr);white-space:nowrap;user-select:none;}
.pill:hover{border-color:var(--border-h);color:var(--text-1);}
.pill.active{background:var(--text-1);color:#fff;border-color:var(--text-1);}
.filter-divider{width:100%;height:1px;background:var(--border);margin:4px 0 8px;opacity:0.6;}
.show-closed-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);cursor:pointer;user-select:none;padding:4px 0;margin-left:60px;}
.show-closed-toggle input{accent-color:var(--accent);}

/* RESULTS HEADER */
.results-section{max-width:1200px;margin:0 auto;padding:0 24px 48px;}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.results-count{font-size:13px;color:var(--text-2);}
.results-count strong{color:var(--text-1);font-weight:600;}
.sort-select{font-size:12px;font-family:var(--font-kr);padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-2);cursor:pointer;outline:none;}

/* COURSE LIST (horizontal rows) */
.course-list{display:flex;flex-direction:column;gap:6px;}
.course-row{display:grid;grid-template-columns:72px 1fr auto;align-items:center;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;transition:all var(--tr);}
.course-row:hover{border-color:var(--border-h);box-shadow:var(--shadow);transform:translateY(-1px);}

/* Col 1: Status */
.row-status{text-align:center;}
.sbadge{font-size:11px;font-weight:600;padding:3px 0;border-radius:4px;display:block;text-align:center;letter-spacing:0.2px;line-height:1.3;}
.sbadge-open{background:var(--accent-l);color:var(--accent-t);}
.sbadge-upcoming{background:var(--blue-l);color:var(--blue);}
.sbadge-closed{background:var(--bg-tag);color:var(--text-3);}
.row-deadline{font-size:10.5px;color:var(--text-3);margin-top:3px;}
.row-deadline.urgent{color:var(--red);font-weight:500;}

/* Col 2: Info */
.row-info{padding:0 16px;min-width:0;}
.row-title{font-size:14.5px;font-weight:600;line-height:1.35;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-meta{display:flex;align-items:center;gap:8px;margin-top:3px;font-size:12.5px;color:var(--text-2);flex-wrap:wrap;}
.row-org-badge{font-size:11px;font-weight:600;padding:1px 6px;border-radius:3px;background:var(--bg-surface);color:var(--text-2);}

/* Col 3: Tags */
.row-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;min-width:0;}
.t{font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--radius-sm);white-space:nowrap;}
.t-cost{background:var(--accent-l);color:var(--accent-t);}
.t-cost-paid{background:var(--amber-l);color:var(--amber);}
.t-dur{background:var(--bg-tag);color:var(--text-2);}
.t-field{background:var(--blue-l);color:var(--blue);}
.t-level{background:var(--purple-l);color:var(--purple);}
.t-mode{background:var(--bg-surface);color:var(--text-2);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.32);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal{background:var(--bg-card);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:slideUp 0.22s ease;}
.m-header{padding:22px 22px 14px;border-bottom:1px solid var(--border);}
.m-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.m-close{width:30px;height:30px;border:none;background:var(--bg-surface);border-radius:50%;cursor:pointer;font-size:15px;color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background var(--tr);}
.m-close:hover{background:var(--border);}
.m-title{font-size:19px;font-weight:700;line-height:1.35;letter-spacing:-0.3px;}
.m-org{font-size:13px;color:var(--text-2);margin-top:3px;}
.m-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 22px;border-bottom:1px solid var(--border);}
.m-metric{text-align:center;padding:10px 6px;background:var(--bg-surface);border-radius:8px;}
.m-metric-label{font-size:11px;color:var(--text-3);margin-bottom:3px;}
.m-metric-value{font-size:16px;font-weight:600;}

.m-body{padding:18px 22px;}
.m-sect{margin-bottom:16px;}
.m-sect-title{font-size:11.5px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.m-sect p{font-size:13.5px;line-height:1.7;color:var(--text-2);}

.m-footer{padding:14px 22px 22px;}

.cta.off{background:var(--bg-tag);color:var(--text-3);cursor:default;pointer-events:none;}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--text-2);}

  .row-tags{display:none;}
  .filter-label{min-width:40px;font-size:11px;}

// ===== STATE =====
let filters = {};
let showClosed = false;
let searchQ = '';

function initFilters() {
  filterDefs.forEach(f => {
    filters[f.key] = f.default || null;
  });
}
initFilters();

// ===== RENDER FILTERS =====
function renderFilters() {
  const sec = document.getElementById('filtersSection');
  let html = '';
  filterDefs.forEach((fd, gi) => {
    html += `<div class="filter-group">`;
    html += `<span class="filter-label">${fd.label}</span>`;
    html += `<div class="filter-pills">`;
    fd.options.forEach(opt => {
      const isActive = fd.type === 'single' ? filters[fd.key] === opt : filters[fd.key] === opt;
      html += `<button class="pill ${isActive ? 'active' : ''}" data-group="${fd.key}" data-type="${fd.type}" data-value="${opt}">${opt}</button>`;
    });
    html += `</div>`;
    if (fd.extra === 'showClosed') {
      html += `<label class="show-closed-toggle"><input type="checkbox" id="showClosedCb" ${showClosed ? 'checked' : ''}> 마감 포함</label>`;
    }
    html += `</div>`;
    if (gi === 0) html += `<div class="filter-divider"></div>`;
  });
  sec.innerHTML = html;

  // Bind events
  sec.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const g = btn.dataset.group;
      const t = btn.dataset.type;
      const v = btn.dataset.value;
      if (t === 'single') {
        filters[g] = v;
      } else {
        filters[g] = filters[g] === v ? null : v;
      }
      renderFilters();
      renderList();
    });
  });
  const cb = document.getElementById('showClosedCb');
  if (cb) cb.addEventListener('change', e => { showClosed = e.target.checked; renderList(); });
}

// ===== FILTER LOGIC =====
function getStatusLabel(c) {
  if (c.status === 'closed') return '마감';
  const today = new Date().toISOString().split('T')[0];
  if (c.recruitEnd < today) return '마감';
  if (c.recruitStart > today) return '모집예정';
  return '모집중';
}

function matchFilter(c) {
  const sl = getStatusLabel(c);
  // Status filter
  const sf = filters.status;
  if (sf && sf !== '전체') {
    if (sf === '모집중' && sl !== '모집중') return false;
    if (sf === '모집예정' && sl !== '모집예정') return false;
  }
  if (!showClosed && sl === '마감') return false;

  // Target
  const tf = filters.target;
  if (tf && tf !== '전체' && !c.target.includes(tf)) return false;

  // Cost
  const cf = filters.cost;
  if (cf && c.cost !== cf) return false;

  // Field
  const ff = filters.field;
  if (ff && !c.field.includes(ff)) return false;

  // Duration
  const df = filters.duration;
  if (df && c.duration !== df) return false;

  // Level
  const lf = filters.level;
  if (lf && c.level !== lf) return false;

  // Mode
  const mf = filters.mode;
  if (mf && c.mode !== mf) return false;

  // Search
  if (searchQ) {
    const h = (c.name + c.org + c.operator + c.program + c.field.join(' ') + c.target.join(' ') + c.level + c.mode).toLowerCase();
    if (!h.includes(searchQ.toLowerCase())) return false;
  }
  return true;
}

function sortList(list) {
  const s = document.getElementById('sortSel').value;
  return [...list].sort((a,b) => {
    if (s === 'deadline') {
      const da = getDDay(a.recruitEnd) ?? 9999;
      const db = getDDay(b.recruitEnd) ?? 9999;
      return da - db;
    }
    if (s === 'latest') return b.id - a.id;
    return a.name.localeCompare(b.name, 'ko');
  });
}

function getDDay(d) { if (!d) return null; return Math.ceil((new Date(d)-new Date())/(864e5)); }

// ===== RENDER LIST =====
function renderList() {
  const filtered = sortList(courses.filter(matchFilter));
  const openCount = courses.filter(c => getStatusLabel(c) === '모집중').length;
  document.getElementById('hTotal').textContent = courses.length;
  document.getElementById('hOpen').textContent = openCount;
  document.getElementById('rCount').innerHTML = `검색 결과 <strong>${filtered.length}</strong>개 과정`;

  const el = document.getElementById('courseList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><h3>조건에 맞는 과정이 없습니다</h3><p>필터를 조정하거나 검색어를 변경해보세요.</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(c => {
    const sl = getStatusLabel(c);
    const sc = sl === '모집중' ? 'sbadge-open' : sl === '모집예정' ? 'sbadge-upcoming' : 'sbadge-closed';
    const dd = getDDay(c.recruitEnd);
    let dlText = '';
    let urg = '';
    if (sl === '모집중' && dd !== null) {
      dlText = dd <= 0 ? '오늘 마감' : `D-${dd}`;
      if (dd <= 7) urg = 'urgent';
    } else if (sl === '모집예정') {
      dlText = c.recruitStart.slice(5).replace('-','/') + ' 시작';
    }
    const costClass = c.cost === '완전 무료' ? 't-cost' : 't-cost-paid';
    const costLabel = c.cost === '완전 무료' ? '무료' : c.cost;
    return `<div class="course-row" onclick="openM(${c.id})">
      <div class="row-status">
        <span class="sbadge ${sc}">${sl}</span>
        <div class="row-deadline ${urg}">${dlText}</div>
      </div>
      <div class="row-info">
        <div class="row-title">${c.name}</div>
        <div class="row-meta">
          <span class="row-org-badge">${c.org}</span>
          <span>${c.program}</span>
          <span style="color:var(--text-3)">·</span>
          <span>${c.modeText}</span>
        </div>
      </div>
      <div class="row-tags">
        <span class="t ${costClass}">${costLabel}</span>
        <span class="t t-dur">${c.durationText}</span>
        ${c.field.slice(0,2).map(f=>`<span class="t t-field">${f}</span>`).join('')}
        <span class="t t-level">${c.level}</span>
      </div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
function openM(id) {
  const c = courses.find(x=>x.id===id);
  if (!c) return;
  const sl = getStatusLabel(c);
  const dd = getDDay(c.recruitEnd);
  const isOpen = sl === '모집중';
  const sc = sl === '모집중' ? 'sbadge-open' : sl === '모집예정' ? 'sbadge-upcoming' : 'sbadge-closed';

  document.getElementById('modal').innerHTML = `
    <div class="m-header">
      <div class="m-header-top">
        <span class="sbadge ${sc}">${sl}${isOpen && dd > 0 ? ' · D-'+dd : ''}</span>
        <button class="m-close" onclick="closeM()">✕</button>
      </div>
      <div class="m-title">${c.name}</div>
      <div class="m-org">${c.org} · ${c.operator}</div>
    </div>
    <div class="m-metrics">
      <div class="m-metric"><div class="m-metric-label">비용</div><div class="m-metric-value ${c.cost==='완전 무료'?'free':''}">${c.cost==='완전 무료'?'무료':c.cost}</div></div>
      <div class="m-metric"><div class="m-metric-label">기간</div><div class="m-metric-value">${c.durationText}</div></div>
      <div class="m-metric"><div class="m-metric-label">방식</div><div class="m-metric-value" style="font-size:14px">${c.modeText}</div></div>
    </div>
    <div class="m-body">
      <div class="m-sect"><div class="m-sect-title">과정 소개</div><p>${c.description}</p></div>
      <div class="m-sect"><div class="m-sect-title">상세 정보</div>
        <div class="m-row"><span class="ml">지원 자격</span><span class="mv">${c.qualification}</span></div>
        <div class="m-row"><span class="ml">교육 기간</span><span class="mv">${c.durationDetail}</span></div>
        <div class="m-row"><span class="ml">실제 비용</span><span class="mv">${c.costDetail}</span></div>
        <div class="m-row"><span class="ml">모집 기간</span><span class="mv">${c.recruitStart.slice(5).replace('-','.')} ~ ${c.recruitEnd.slice(5).replace('-','.')}</span></div>
        <div class="m-row"><span class="ml">수준</span><span class="mv">${c.level}</span></div>
        <div class="m-row"><span class="ml">분야</span><span class="mv">${c.field.join(', ')}</span></div>
        <div class="m-row"><span class="ml">대상</span><span class="mv">${c.target.join(', ')}</span></div>
      </div>
      ${c.benefit ? `<div class="m-sect"><div class="m-sect-title">혜택</div><p>${c.benefit}</p></div>` : ''}
    </div>
    <div class="m-footer">
      <a href="${c.url}" target="_blank" rel="noopener" class="cta ${sl==='마감'?'off':''}">
        ${sl==='마감'?'모집이 마감되었습니다':'공식 신청 페이지로 이동 →'}
      </a>
    </div>`;
  document.getElementById('mo').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeM() { document.getElementById('mo').classList.remove('active'); document.body.style.overflow=''; }
document.getElementById('mo').addEventListener('click', e => { if (e.target === e.currentTarget) closeM(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeM(); });

// Search
document.getElementById('searchInput').addEventListener('input', e => { searchQ = e.target.value.trim(); renderList(); });
document.getElementById('sortSel').addEventListener('change', renderList);

// Init
renderFilters();
renderList();
</script>
